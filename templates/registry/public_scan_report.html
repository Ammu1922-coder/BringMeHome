<!DOCTYPE html>
<html>
<head>
    <title>Report Sighting</title>
    <style>
        /* Add your basic styling here to keep it centered and clean */
        .container { max-width: 400px; margin: auto; padding: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 10px; margin-top: 5px; }
        button { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 5px; }
        #gps-status { color: red; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Found {{ person.full_name }}?</h2>
    
    <div id="gps-status">Please enable location access to alert the family.</div>



    {% if form.errors %}
        <div style="background: #ffe6e6; color: #cc0000; padding: 15px; margin-bottom: 20px; border: 1px solid #cc0000;">
            <strong>Please fix the following:</strong>
            {{ form.errors }}
        </div>
    {% endif %}

    <form method="POST" id="reportForm">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Your Name:</label>
            {{ form.citizen_name }}
        </div>

        <div class="form-group">
            <label>Your Phone Number:</label>
            {{ form.citizen_phone }}
        </div>

        <input type="hidden" id="lat" name="latitude">
        <input type="hidden" id="lon" name="longitude">
        <input type="hidden" id="location_name" name="location_name">

        <button type="submit" id="submit-btn" disabled>Send Location & Contact Details</button>
    </form>
</div>



<script>
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async function(position) {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        document.getElementById('lat').value = lat;
        document.getElementById('lon').value = lon;

        try {
            const response = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
            );

            const data = await response.json();

            document.getElementById("location_name").value =
                data.display_name;

        } catch (e) {
            document.getElementById("location_name").value =
                lat + ", " + lon;
        }

        document.getElementById('gps-status').innerText = "✅ Location secured!";
        document.getElementById('gps-status').style.color = "green";
        document.getElementById('submit-btn').disabled = false;

    });
}
</script>
</body>
</html>
