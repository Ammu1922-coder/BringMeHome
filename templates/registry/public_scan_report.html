<!DOCTYPE html>
<html>
<head>
    <title>Report Sighting</title>
    <style>
        /* Add your basic styling here to keep it centered and clean */
        .container { max-width: 400px; margin: auto; padding: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 10px; margin-top: 5px; }
        button { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 5px; }
        #gps-status { color: red; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Found {{ person.full_name }}?</h2>
    
    <div id="gps-status">Please enable location access to alert the family.</div>

    <form method="POST" id="reportForm">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Your Name:</label>
            {{ form.citizen_name }}
        </div>

        <div class="form-group">
            <label>Your Phone Number:</label>
            {{ form.citizen_phone }}
        </div>

        <input type="hidden" id="lat" name="latitude">
        <input type="hidden" id="lon" name="longitude">

        <button type="submit" id="submit-btn" disabled>Send Location & Contact Details</button>
    </form>
</div>



<script>
    // Simple GPS script to fill the hidden fields
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById('lat').value = position.coords.latitude;
            document.getElementById('lon').value = position.coords.longitude;
            document.getElementById('gps-status').innerText = "✅ Location secured!";
            document.getElementById('gps-status').style.color = "green";
            document.getElementById('submit-btn').disabled = false;
        });
    }
</script>
</body>
</html>
